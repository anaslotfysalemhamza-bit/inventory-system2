                    </div>
                    ${isDeferredInvoice ? `
                    <div style="text-align: center; padding: 4px; font-size: 7px; color: #92400e; border-top: 1px dashed #f59e0b; margin-top: 4px; padding-top: 4px;">
                        ⏳ هذا المبلغ متبقي على المورد
                    </div>
                    ` : ''}
                </div>
                <div class="divider"></div>
                <div class="invoice-footer">
                    <div class="thank-you">🙏 شكراً لحسن تعاملكم</div>
                    <div class="footer-text">نتمنى لكم طيب الإقامة</div>
                    <div class="footer-text" style="font-size: 6px; color: #aaa; margin-top: 4px;">
                        تم الإنشاء بواسطة نظام عطارة الصالح
                    </div>
                </div>
            </div>
            <script>
                window.onload = function() {
                    window.print();
                    setTimeout(function() { window.close(); }, 1000);
                };
            <\/script>
        </body>
        </html>`);
            w.document.close();
        }

        function printLastInvoice() {
            if (lastInvoiceData) {
                printInvoice(lastInvoiceData);
            } else {
                showNotification('لا توجد فاتورة للطباعة', 'error');
            }
        }

        // ================================================================
        //  تحميل الفواتير الأخيرة
        // ================================================================
        async function loadRecentPurchases() {
            await fetchPurchases();
            var recent = [];
            for (var i = allPurchases.length - 1; i >= 0 && i >= allPurchases.length - 10; i--) {
                recent.push(allPurchases[i]);
            }
            var html = '';
            for (var i = 0; i < recent.length; i++) {
                var isDeferredInv = recent[i].is_deferred || false;
                var cls = isDeferredInv ? 'invoice-chip deferred' : 'invoice-chip';
                html += '<button class="' + cls + '" onclick="viewPurchase(\'' + recent[i].invoiceNumber + '\')">';
                html += '    <i class="fas fa-file-invoice"></i> ' + recent[i].invoiceNumber;
                html += isDeferredInv ? ' 📋' : '';
                html += '</button>';
            }
            document.getElementById('recentInvoices').innerHTML = html || '<span style="color:#6b7280;">لا توجد فواتير سابقة</span>';
        }

        async function viewPurchase(invoiceNumber) {
            try {
                var response = await fetch(API_URL + '/purchases/' + invoiceNumber);
                var result = await response.json();
                if (result.success) {
                    printInvoice(result.data);
                } else {
                    showNotification('لم يتم العثور على الفاتورة', 'error');
                }
            } catch (e) {
                console.error('Error viewing purchase:', e);
                showNotification('حدث خطأ في جلب الفاتورة', 'error');
            }
        }

        // ================================================================
        //  Sidebar
        // ================================================================
        function initSidebar() {
            var toggle = document.getElementById('menuToggle');
            var closeSidebar = document.getElementById('closeSidebar');
            var sidebar = document.getElementById('sidebar');

            if (toggle) {
                toggle.onclick = function () {
                    if (sidebar) sidebar.classList.add('open');
                };
            }
            if (closeSidebar) {
                closeSidebar.onclick = function () {
                    if (sidebar) sidebar.classList.remove('open');
                };
            }
            document.addEventListener('click', function (e) {
                if (window.innerWidth <= 992 && sidebar && !sidebar.contains(e.target) &&
                    toggle && !toggle.contains(e.target)) {
                    sidebar.classList.remove('open');
                }
            });
        }

        function logout() {
            if (confirm('هل تريد تسجيل الخروج؟')) {
                localStorage.removeItem('currentUser');
                window.location.href = 'login.html';
            }
        }

        // ================================================================
        //  التهيئة
        // ================================================================
        async function init() {
            initSidebar();

            currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser || (currentUser.role !== 'admin' && currentUser.role !== 'storekeeper')) {
                if (currentUser && currentUser.role === 'cashier') {
                    window.location.href = 'pos.html';
                } else {
                    window.location.href = 'login.html';
                }
                return;
            }
            
            // تحديث الصورة والاسم
            updateTopBarAvatar();

            showLoading(true);

            // تحميل جميع البيانات
            await fetchProducts();
            await fetchStock();
            await fetchSuppliers();
            await fetchLocations();
            await fetchPurchases();

            // تحميل القوائم
            await loadLocations();

            // عرض المنتجات
            await renderQuickProducts();

            // تحميل الفواتير الأخيرة
            await loadRecentPurchases();

            // توليد رقم الفاتورة
            displayInvoiceNumber();

            // تعيين التاريخ
            document.getElementById('purchaseDate').value = new Date().toISOString().slice(0, 10);

            // إعداد البحث عن الموردين
            setupSupplierSearch();

            // إضافة مستمعين لتحديث ملخص الدفع
            document.getElementById('paidAmount').addEventListener('input', updatePaymentSummary);
            document.getElementById('downPayment').addEventListener('input', updatePaymentSummary);

            // تعيين طريقة الدفع الافتراضية
            setPaymentMethod('cash');

            // أحداث
            document.getElementById('searchInput').addEventListener('input', async function (e) {
                var term = e.target.value.toLowerCase();
                if (!term) { await renderQuickProducts(); return; }
                var filtered = [];
                for (var i = 0; i < allProducts.length; i++) {
                    var p = allProducts[i];
                    if (p.name.toLowerCase().includes(term) || p.code.toLowerCase().includes(term)) {
                        filtered.push(p);
                    }
                }
                await fetchStock();
                var html = '';
                for (var i = 0; i < filtered.length && i < 20; i++) {
                    var p = filtered[i];
                    var qty = 0;
                    for (var j = 0; j < allStock.length; j++) {
                        if (allStock[j].productId == p.id) qty += allStock[j].quantity;
                    }
                    var price = parseFloat(p.purchasePrice || 0);
                    html += '\n                        <div class="product-item" onclick="prepareAddProduct(' + p.id + ', ' + price + ')">\n';
                    html += '                            <div class="product-code-badge">' + p.code + '</div>\n';
                    html += '                            <div class="product-name">' + p.name + '</div>\n';
                    html += '                            <div class="product-price">' + price.toLocaleString() + ' ج.م</div>\n';
                    html += '                            <div class="product-stock">المخزون: ' + qty + '</div>\n';
                    html += '                        </div>\n';
                }
                document.getElementById('quickProducts').innerHTML = html || '<div style="padding:30px; text-align:center;">لا توجد نتائج</div>';
            });

            // Enter على حقل الكود
            document.getElementById('productCodeInput').addEventListener('keydown', function (e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    addProductByCode();
                }
            });

            // Enter على حقل بحث المورد
            document.getElementById('supplierSearch').addEventListener('keydown', function (e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    var val = this.value.trim();
                    if (val) {
                        selectSupplier(val);
                    }
                }
            });

            showLoading(false);
            document.getElementById('productCodeInput').focus();
        }

        init();
    </script>
</body>

</html>
